<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HASAD — Köyden Seçildi, Sofranıza Ulaştı</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#F3F1E8;--panel:#FFFFFF;--panel2:#ECEFE6;--panel3:#DCE3D7;
  --lime:#C8F169;--lime-d:#A9DB4E;--grn:#2E7A45;--tang:#D9662F;
  --ink:#172A20;--ink-on:#14301E;
  --cream:#F0F0E8;--muted:#5E6D62;--muted2:#8B9A90;
  --line:rgba(23,42,32,.12);--line2:rgba(23,42,32,.06);
  --disp:'Syne',sans-serif;--sans:'Space Grotesk',system-ui,sans-serif;
  --rail:252px;--r:22px;--r2:30px;--maxw:1240px;
  --sh:0 14px 36px rgba(23,42,32,.10);
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{background:var(--bg);color:var(--ink);font-family:var(--sans);line-height:1.6;overflow-x:hidden;-webkit-font-smoothing:antialiased;
  background-image:radial-gradient(900px 520px at 88% -6%,rgba(46,122,69,.08),transparent 60%),radial-gradient(720px 520px at -12% 112%,rgba(217,102,47,.06),transparent 60%);}
a{color:inherit;text-decoration:none;}
button{cursor:pointer;font-family:inherit;border:none;background:none;color:inherit;}
::selection{background:var(--lime);color:var(--ink-on);}
h1,h2,h3,h4{font-family:var(--disp);font-weight:800;letter-spacing:-.02em;line-height:1.02;}

/* LOADER */
.loader{position:fixed;inset:0;z-index:999;background:var(--ink);display:flex;align-items:center;justify-content:center;flex-direction:column;gap:20px;transition:opacity .6s ease,visibility .6s ease;}
.loader.hidden{opacity:0;visibility:hidden;pointer-events:none;}
.loader-logo{font-family:var(--disp);font-size:2.4rem;font-weight:800;letter-spacing:.12em;color:var(--lime);animation:glow 1.4s ease infinite;}
.loader-bar{width:200px;height:2px;background:rgba(255,255,255,.12);border-radius:2px;overflow:hidden;}
.loader-fill{height:100%;background:linear-gradient(90deg,var(--grn),var(--lime));border-radius:2px;animation:fill-bar .9s ease forwards;}
.loader-sub{font-size:.72rem;color:rgba(255,255,255,.4);letter-spacing:.14em;text-transform:uppercase;}
@keyframes fill-bar{from{width:0}to{width:100%}}
@keyframes glow{0%,100%{text-shadow:0 0 12px rgba(200,241,105,.3)}50%{text-shadow:0 0 32px rgba(200,241,105,.8),0 0 60px rgba(200,241,105,.3)}}

/* SIDEBAR */
.sidebar{position:fixed;top:0;left:0;bottom:0;width:var(--rail);z-index:60;background:linear-gradient(180deg,#0E2017,#123022);border-right:1px solid rgba(0,0,0,.1);display:flex;flex-direction:column;padding:26px 18px;transition:transform .4s cubic-bezier(.4,0,.2,1);box-shadow:2px 0 24px rgba(23,42,32,.08);}
.sb-logo{display:flex;align-items:center;gap:11px;cursor:pointer;padding:0 8px 8px;margin-bottom:26px;}
.sb-logo .mark{width:42px;height:42px;border-radius:13px;background:var(--lime);display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:transform .3s ease;}
.sb-logo:hover .mark{transform:rotate(8deg) scale(1.08);}
.sb-logo b{font-family:var(--disp);font-size:1.4rem;font-weight:800;letter-spacing:.04em;display:block;line-height:.9;color:#F4F3EC;}
.sb-logo small{font-size:.66rem;color:var(--lime);letter-spacing:.18em;text-transform:uppercase;}
.sb-nav{display:flex;flex-direction:column;gap:4px;flex:1;}
.sb-nav a{display:flex;align-items:center;gap:13px;padding:12px 14px;border-radius:14px;font-weight:600;font-size:.92rem;color:#A6B8AC;transition:all .22s;}
.sb-nav a .ic{width:22px;text-align:center;font-size:1.05rem;transition:transform .22s;}
.sb-nav a:hover{background:rgba(255,255,255,.07);color:#F4F3EC;}
.sb-nav a:hover .ic{transform:scale(1.18);}
.sb-nav a.on{background:var(--lime);color:var(--ink-on);font-weight:700;}
.sb-foot{border-top:1px solid rgba(255,255,255,.12);padding-top:18px;}
.sb-wa{display:flex;align-items:center;justify-content:center;gap:9px;width:100%;padding:13px;border-radius:14px;background:#25D366;color:#06281A;font-weight:700;font-size:.85rem;transition:transform .2s,filter .2s;}
.sb-wa:hover{transform:translateY(-2px);filter:brightness(1.08);}
.sb-meta{font-size:.68rem;color:#7C8C82;text-align:center;margin-top:14px;line-height:1.5;}

/* MOBILE TOP */
.mtop{display:none;position:fixed;top:0;left:0;right:0;z-index:55;height:62px;background:rgba(243,241,232,.92);backdrop-filter:blur(12px);border-bottom:1px solid var(--line);align-items:center;justify-content:space-between;padding:0 16px;}
.mtop .mlogo{display:flex;align-items:center;gap:9px;font-family:var(--disp);font-weight:800;letter-spacing:.05em;color:var(--ink);}
.mtop .mlogo .mark{width:32px;height:32px;border-radius:10px;background:var(--lime);display:flex;align-items:center;justify-content:center;}
.burger{width:42px;height:42px;border-radius:12px;background:var(--panel);border:1px solid var(--line);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:5px;}
.burger span{width:18px;height:2px;background:var(--ink);border-radius:2px;}
.ov{position:fixed;inset:0;background:rgba(23,42,32,.4);z-index:58;opacity:0;pointer-events:none;transition:opacity .35s;}
.ov.open{opacity:1;pointer-events:all;}

/* APP */
.app{margin-left:var(--rail);padding:36px 0 130px;}
.pg{display:none;max-width:var(--maxw);margin:0 auto;padding:0 clamp(22px,4vw,56px);}
.pg.active{display:block;animation:fade .5s ease;}
@keyframes fade{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}

/* SCROLL REVEAL */
.reveal{opacity:0;transform:translateY(24px);transition:opacity .65s cubic-bezier(.4,0,.2,1),transform .65s cubic-bezier(.4,0,.2,1);}
.reveal.in{opacity:1;transform:none;}
.reveal-l{opacity:0;transform:translateX(-32px);transition:opacity .65s ease,transform .65s ease;}
.reveal-l.in{opacity:1;transform:none;}
.reveal-r{opacity:0;transform:translateX(32px);transition:opacity .65s ease,transform .65s ease;}
.reveal-r.in{opacity:1;transform:none;}
.reveal-s{opacity:0;transform:scale(.92);transition:opacity .6s ease,transform .6s ease;}
.reveal-s.in{opacity:1;transform:scale(1);}
.d1{transition-delay:.07s}.d2{transition-delay:.14s}.d3{transition-delay:.21s}.d4{transition-delay:.28s}.d5{transition-delay:.35s}

/* BENTO */
.bento{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;}
.tile{background:var(--panel);border:1px solid var(--line);border-radius:var(--r2);padding:26px;position:relative;overflow:hidden;box-shadow:var(--sh);}
.b-main{grid-column:span 2;grid-row:span 2;display:flex;flex-direction:column;justify-content:space-between;background:linear-gradient(155deg,#1E4632,#143020);border-color:transparent;min-height:330px;}
.b-main .badge{display:inline-flex;align-items:center;gap:8px;align-self:flex-start;background:rgba(200,241,105,.16);color:var(--lime);border:1px solid rgba(200,241,105,.3);padding:7px 14px;border-radius:100px;font-size:.74rem;font-weight:600;}
.b-main h1{font-size:clamp(2rem,3.4vw,3.2rem);margin:18px 0;color:#F4F3EC;}
.b-main h1 em{font-style:normal;color:var(--lime);}
.b-main p{color:rgba(244,243,236,.8);max-width:420px;font-size:.96rem;}
.b-main .cta{display:flex;gap:11px;flex-wrap:wrap;margin-top:22px;}
.btn-lime{background:var(--lime);color:var(--ink-on);padding:13px 24px;border-radius:100px;font-weight:700;font-size:.88rem;display:inline-flex;align-items:center;gap:8px;transition:transform .22s,box-shadow .22s;position:relative;overflow:hidden;}
.btn-lime::after{content:'';position:absolute;top:-50%;left:-60%;width:40%;height:200%;background:rgba(255,255,255,.2);transform:skewX(-20deg);transition:left .5s ease;pointer-events:none;}
.btn-lime:hover::after{left:130%;}
.btn-lime:hover{transform:translateY(-3px);box-shadow:0 12px 28px rgba(169,219,78,.4);}
.btn-lime span{transition:transform .22s;}.btn-lime:hover span{transform:translateX(4px);}
.btn-gh{background:transparent;border:1.5px solid rgba(244,243,236,.3);color:#F4F3EC;padding:13px 22px;border-radius:100px;font-weight:600;font-size:.88rem;transition:all .22s;}
.btn-gh:hover{border-color:var(--lime);color:var(--lime);}

/* HERO IMAGE */
.b-art{grid-column:span 2;grid-row:span 2;padding:0;overflow:hidden;border-color:transparent;min-height:330px;position:relative;}
.b-art-img{width:100%;height:100%;object-fit:cover;display:block;min-height:330px;transition:transform .6s ease;}
.b-art:hover .b-art-img{transform:scale(1.04);}
.b-art-overlay{position:absolute;inset:0;background:linear-gradient(to top,rgba(14,32,23,.72) 0%,rgba(14,32,23,.15) 50%,transparent 100%);}
.b-art .seal{position:absolute;top:18px;right:18px;width:74px;height:74px;animation:spin 24s linear infinite;z-index:2;}
.b-art .cap{position:absolute;left:22px;bottom:20px;z-index:2;background:rgba(13,31,23,.8);backdrop-filter:blur(8px);border:1px solid rgba(255,255,255,.18);border-radius:14px;padding:10px 16px;font-size:.8rem;font-weight:600;color:#F4F3EC;}
.b-art .cap small{display:block;color:var(--lime);font-size:.66rem;margin-top:2px;}

.b-stat{display:flex;flex-direction:column;justify-content:center;}
.b-stat.lime{background:var(--lime);color:var(--ink-on);border-color:transparent;}
.b-stat .num{font-family:var(--disp);font-size:2.5rem;font-weight:800;line-height:1;}
.b-stat .lbl{font-size:.76rem;font-weight:600;opacity:.72;margin-top:6px;}
.b-feat{display:flex;flex-direction:column;justify-content:space-between;cursor:pointer;transition:transform .25s,border-color .25s;}
.b-feat:hover{transform:translateY(-4px);border-color:var(--grn);}
.b-feat .fem{font-size:2.4rem;}
.b-feat .fn{font-family:var(--disp);font-weight:700;font-size:1.05rem;margin-top:8px;}
.b-feat .fp{color:var(--grn);font-weight:700;font-size:.92rem;}

/* MARQUEE */
.marquee{margin:18px 0 6px;overflow:hidden;border-top:1px solid var(--line);border-bottom:1px solid var(--line);padding:14px 0;}
.mq-track{display:flex;width:max-content;white-space:nowrap;animation:scrollx 28s linear infinite;}
.marquee:hover .mq-track{animation-play-state:paused;}
.mq-track span{font-family:var(--disp);font-weight:700;font-size:1rem;color:var(--muted);padding:0 20px;display:inline-flex;gap:20px;align-items:center;}
.mq-track span::after{content:'';width:6px;height:6px;border-radius:50%;background:var(--grn);}

/* SECTION */
.sec{margin-top:clamp(40px,6vw,72px);}
.sec-hd{display:flex;align-items:flex-end;justify-content:space-between;gap:20px;margin-bottom:24px;flex-wrap:wrap;}
.sec-hd .sub{font-size:.72rem;font-weight:700;letter-spacing:.16em;text-transform:uppercase;color:var(--grn);margin-bottom:9px;display:block;}
.sec-hd h2{font-size:clamp(1.7rem,3vw,2.4rem);}
.sec-hd h2 em{font-style:normal;color:var(--muted);}
.sec-hd p{color:var(--muted);font-size:.9rem;max-width:440px;margin-top:6px;}
.rail-link{color:var(--grn);font-weight:700;font-size:.86rem;display:inline-flex;align-items:center;gap:6px;white-space:nowrap;transition:gap .2s;}
.rail-link:hover{gap:10px;}

/* RAIL */
.rail{display:flex;gap:16px;overflow-x:auto;padding:6px 4px 18px;scroll-snap-type:x mandatory;}
.rail>*{scroll-snap-align:start;flex:0 0 260px;}
.rail-hint{font-size:.74rem;color:var(--muted2);margin-top:-6px;}

/* PRODUCT CARD */
.pgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:16px;}
.pcard{background:var(--panel);border:1px solid var(--line);border-radius:var(--r);overflow:hidden;transition:transform .28s cubic-bezier(.34,1.3,.64,1),border-color .28s,box-shadow .28s;display:flex;flex-direction:column;box-shadow:var(--sh);}
.pcard:hover{transform:translateY(-6px);border-color:var(--grn);box-shadow:0 20px 48px rgba(23,42,32,.16);}
.pimg{aspect-ratio:5/4;position:relative;overflow:hidden;background:#1a3020;}
.pimg-photo{width:100%;height:100%;object-fit:cover;display:block;transition:transform .5s ease,filter .3s ease;}
.pcard:hover .pimg-photo{transform:scale(1.07);filter:brightness(1.06) saturate(1.1);}
.pimg-fallback{position:absolute;inset:0;display:none;align-items:center;justify-content:center;font-size:3.5rem;background:linear-gradient(135deg,#1a3020,#2E4A38);}
.pcat{position:absolute;top:11px;left:11px;z-index:2;background:rgba(13,31,23,.82);backdrop-filter:blur(5px);color:var(--lime);border:1px solid rgba(255,255,255,.14);border-radius:100px;font-size:.64rem;font-weight:700;padding:4px 10px;}
.pbadge{position:absolute;top:11px;right:11px;z-index:2;background:var(--tang);color:#fff;border-radius:100px;font-size:.62rem;font-weight:800;padding:4px 9px;}
.pimg::after{content:'';position:absolute;top:0;left:-100%;width:50%;height:100%;background:linear-gradient(90deg,transparent,rgba(255,255,255,.09),transparent);transition:left .6s ease;pointer-events:none;z-index:3;}
.pcard:hover .pimg::after{left:150%;}
.pbody{padding:15px;display:flex;flex-direction:column;flex:1;}
.pprod{font-size:.7rem;color:var(--muted);font-weight:500;margin-bottom:5px;}
.pname{font-family:var(--disp);font-size:1.1rem;font-weight:700;margin-bottom:7px;}
.pstars{display:flex;align-items:center;gap:5px;margin-bottom:13px;font-size:.74rem;color:var(--muted);}
.pstars b{color:var(--grn);}
.pfoot{display:flex;align-items:center;justify-content:space-between;margin-top:auto;}
.pprice{font-family:var(--disp);font-size:1.25rem;font-weight:800;}
.pprice small{font-size:.66rem;color:var(--muted);font-weight:500;}
.min-order{font-size:.62rem;color:var(--muted2);margin-top:4px;font-style:italic;}
.add{width:42px;height:42px;border-radius:13px;background:var(--lime);color:var(--ink-on);display:flex;align-items:center;justify-content:center;font-size:1.4rem;transition:transform .22s,background .22s,box-shadow .22s;}
.add:hover{transform:scale(1.12) rotate(90deg);background:var(--grn);color:#fff;box-shadow:0 6px 18px rgba(46,122,69,.4);}
.qty{display:flex;align-items:center;gap:9px;background:var(--panel2);border-radius:13px;padding:5px 8px;}
.qb{width:28px;height:28px;border-radius:9px;background:#fff;border:1px solid var(--line);display:flex;align-items:center;justify-content:center;font-weight:800;transition:all .18s;}
.qb:hover{background:var(--lime);color:var(--ink-on);border-color:transparent;}
.qn{font-weight:800;min-width:18px;text-align:center;color:var(--grn);}

/* FILTER */
.filters{display:flex;gap:9px;flex-wrap:wrap;margin-bottom:24px;}
.fil{padding:9px 17px;border-radius:100px;border:1px solid var(--line);font-size:.82rem;font-weight:600;color:var(--muted);background:var(--panel);transition:all .2s;}
.fil:hover{color:var(--ink);border-color:var(--grn);}
.fil.on{background:var(--grn);color:#fff;border-color:transparent;}

/* HOW STEPS */
.steps{display:grid;grid-template-columns:repeat(5,1fr);gap:14px;}
.step{background:var(--panel);border:1px solid var(--line);border-radius:var(--r);padding:22px 18px;transition:transform .25s,border-color .25s;box-shadow:var(--sh);}
.step:hover{transform:translateY(-5px);border-color:var(--grn);}
.step .n{font-family:var(--disp);font-size:2rem;font-weight:800;color:var(--grn);line-height:1;transition:transform .3s;}
.step:hover .n{transform:scale(1.15);}
.step .em{font-size:1.4rem;margin:10px 0 8px;display:inline-block;transition:transform .3s;}
.step:hover .em{transform:translateY(-4px) scale(1.1);}
.step h4{font-size:1rem;}
.step p{font-size:.76rem;color:var(--muted);margin-top:4px;}

/* HOW PAGE */
.htl{max-width:720px;}
.hstep{display:flex;gap:22px;margin-bottom:16px;}
.hstep .left{flex-shrink:0;display:flex;flex-direction:column;align-items:center;}
.hstep .n{width:58px;height:58px;border-radius:17px;background:var(--lime);color:var(--ink-on);display:flex;align-items:center;justify-content:center;font-family:var(--disp);font-size:1.4rem;font-weight:800;}
.hstep .line{flex:1;width:2px;background:linear-gradient(var(--line),transparent);margin:6px 0;}
.hstep .c{background:var(--panel);border:1px solid var(--line);border-radius:var(--r);padding:20px 22px;flex:1;margin-bottom:6px;box-shadow:var(--sh);}
.hstep .c h4{font-size:1.15rem;margin-bottom:6px;}
.hstep .c p{color:var(--muted);font-size:.9rem;}
.tip{margin-top:11px;padding:10px 14px;background:rgba(46,122,69,.1);border-left:3px solid var(--grn);border-radius:10px;font-size:.8rem;color:var(--grn);font-weight:600;}

/* CALENDAR */
.cal{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:14px;}
.cal-c{background:var(--panel);border:1px solid var(--line);border-radius:var(--r);padding:20px;text-align:center;transition:transform .25s,border-color .25s;box-shadow:var(--sh);}
.cal-c:hover{transform:translateY(-5px);border-color:var(--grn);}
.cal-c .mon{font-size:.72rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--tang);margin-bottom:10px;}
.cal-c .em{font-size:2.1rem;display:inline-block;transition:transform .3s;}
.cal-c:hover .em{transform:scale(1.3) rotate(10deg);}
.cal-c .pn{font-family:var(--disp);font-weight:700;font-size:1rem;margin-top:8px;}
.cal-c .tg{font-size:.7rem;color:var(--muted);margin-top:3px;}

/* PRODUCER CARD */
.prgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(290px,1fr));gap:18px;}
.prcard{background:var(--panel);border:1px solid var(--line);border-radius:var(--r2);overflow:hidden;transition:transform .28s,border-color .28s,box-shadow .28s;box-shadow:var(--sh);position:relative;}
.prcard:hover{transform:translateY(-6px);border-color:var(--grn);box-shadow:0 20px 48px rgba(23,42,32,.16);}
.prcard::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,transparent,var(--grn),transparent);transform:scaleX(0);transition:transform .4s ease;z-index:1;}
.prcard:hover::before{transform:scaleX(1);}
.prtop{height:140px;position:relative;overflow:hidden;background:linear-gradient(135deg,#1a3020,#2E4A38);}
.prtop-img{width:100%;height:100%;object-fit:cover;display:block;transition:transform .5s ease;}
.prcard:hover .prtop-img{transform:scale(1.06);}
.prtop-overlay{position:absolute;inset:0;background:linear-gradient(to bottom,rgba(14,32,23,.1),rgba(14,32,23,.65));}
.prav{position:absolute;bottom:-34px;left:22px;z-index:2;width:68px;height:68px;border-radius:18px;background:#fff;border:3px solid var(--lime);display:flex;align-items:center;justify-content:center;font-size:2rem;box-shadow:0 8px 20px rgba(23,42,32,.2);transition:transform .3s,box-shadow .3s;}
.prcard:hover .prav{transform:rotate(-6deg) scale(1.05);box-shadow:0 12px 28px rgba(23,42,32,.28);}
.prwax{position:absolute;top:12px;right:12px;z-index:3;display:inline-flex;align-items:center;gap:5px;background:rgba(13,31,23,.8);backdrop-filter:blur(6px);border:1px solid rgba(255,255,255,.18);border-radius:100px;padding:5px 11px;font-size:.66rem;font-weight:700;color:var(--lime);}
.prb{padding:46px 22px 22px;}
.prname{font-family:var(--disp);font-size:1.25rem;font-weight:700;}
.prloc{font-size:.76rem;color:var(--muted);margin-bottom:13px;}
.pr-score-wrap{display:flex;align-items:center;gap:12px;margin-bottom:14px;padding:12px 14px;background:rgba(46,122,69,.07);border-radius:12px;border:1px solid rgba(46,122,69,.15);}
.pr-score-num{font-family:var(--disp);font-size:2.2rem;font-weight:800;color:var(--grn);line-height:1;}
.pr-score-right{display:flex;flex-direction:column;gap:4px;}
.pr-stars{display:flex;gap:3px;}
.pr-star{font-size:1rem;color:var(--grn);}
.prcard:hover .pr-star{animation:star-pop .3s ease both;}
.pr-star:nth-child(1){animation-delay:.0s}.pr-star:nth-child(2){animation-delay:.06s}.pr-star:nth-child(3){animation-delay:.12s}.pr-star:nth-child(4){animation-delay:.18s}.pr-star:nth-child(5){animation-delay:.24s}
@keyframes star-pop{0%{transform:scale(1)}50%{transform:scale(1.45)}100%{transform:scale(1)}}
.pr-rev{font-size:.72rem;color:var(--muted);}
.pr-badge{background:rgba(46,122,69,.12);color:var(--grn);border-radius:100px;font-size:.68rem;font-weight:700;padding:3px 10px;border:1px solid rgba(46,122,69,.2);}
.prtags{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px;}
.ptag{background:var(--panel2);border:1px solid var(--line);color:var(--ink);border-radius:100px;font-s
